<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drop — Peer-to-Peer File Transfer</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ─── Utility ─── */
    function formatBytes(bytes) {
      if (bytes === 0) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }

    function generateId() {
      const words = [
        'amber','blaze','cedar','dawn','echo','frost','glow','haze','iris','jade',
        'kite','luna','mist','nova','opal','pine','quill','rain','sage','tide',
        'vale','wave','zeal','apex','bolt','core','dusk','edge','flux','grid'
      ];
      const w1 = words[Math.floor(Math.random() * words.length)];
      const w2 = words[Math.floor(Math.random() * words.length)];
      const num = Math.floor(Math.random() * 90 + 10);
      return `${w1}-${w2}-${num}`;
    }

    /* ─── Icons (inline SVG) ─── */
    const CopyIcon = () => (
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
      </svg>
    );
    const CheckIcon = () => (
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    );
    const FileIcon = () => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>
      </svg>
    );
    const DownloadIcon = () => (
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
    );
    const XIcon = () => (
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    );
    const LinkIcon = () => (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
      </svg>
    );

    /* ─── Toast Component ─── */
    function Toast({ message, type, onDone }) {
      useEffect(() => {
        const t = setTimeout(onDone, 3000);
        return () => clearTimeout(t);
      }, []);
      const bg = type === 'success' ? 'var(--accent-dim)' : type === 'error' ? '#7f1d1d' : 'var(--surface-2)';
      const borderColor = type === 'success' ? 'var(--accent)' : type === 'error' ? 'var(--danger)' : 'var(--border)';
      return (
        <div style={{
          position:'fixed', top:24, right:24, zIndex:1000,
          background: bg, border:`1px solid ${borderColor}`,
          borderRadius:12, padding:'12px 20px',
          fontFamily:"'DM Mono', monospace", fontSize:13,
          color:'var(--text)', animation:'slideIn 0.3s ease',
          maxWidth: 340, boxShadow:'0 8px 32px rgba(0,0,0,0.4)'
        }}>
          {message}
        </div>
      );
    }

    /* ─── Connection Request Modal ─── */
    function ConnectionModal({ fromId, onAccept, onReject }) {
      return (
        <div style={{
          position:'fixed', inset:0, zIndex:999,
          background:'rgba(0,0,0,0.7)', backdropFilter:'blur(8px)',
          display:'flex', alignItems:'center', justifyContent:'center',
          animation:'fadeIn 0.2s ease'
        }}>
          <div style={{
            background:'var(--surface)', border:'1px solid var(--border)',
            borderRadius:20, padding:'36px 40px', maxWidth:420, width:'90%',
            animation:'scaleIn 0.3s ease', textAlign:'center'
          }}>
            <div style={{
              width:56, height:56, borderRadius:'50%',
              background:'var(--accent-glow)', border:'1px solid var(--accent)',
              display:'flex', alignItems:'center', justifyContent:'center',
              margin:'0 auto 20px', animation:'ripple 2s infinite'
            }}>
              <LinkIcon />
            </div>
            <h3 style={{ fontFamily:"'Outfit', sans-serif", fontWeight:600, fontSize:20, marginBottom:8 }}>
              Incoming Connection
            </h3>
            <p style={{ color:'var(--text-dim)', fontSize:14, marginBottom:6 }}>
              Someone wants to connect with you
            </p>
            <p style={{
              fontFamily:"'DM Mono', monospace", fontSize:15,
              color:'var(--accent)', background:'var(--accent-glow)',
              padding:'8px 16px', borderRadius:8, display:'inline-block',
              marginBottom:28
            }}>
              {fromId}
            </p>
            <div style={{ display:'flex', gap:12, justifyContent:'center' }}>
              <button onClick={onReject} style={{
                fontFamily:"'Outfit', sans-serif", fontSize:14, fontWeight:500,
                padding:'10px 28px', borderRadius:10, border:'1px solid var(--border)',
                background:'var(--surface-2)', color:'var(--text-dim)', cursor:'pointer',
                transition:'all 0.2s'
              }}
                onMouseEnter={e => { e.target.style.borderColor='var(--danger)'; e.target.style.color='var(--danger)'; }}
                onMouseLeave={e => { e.target.style.borderColor='var(--border)'; e.target.style.color='var(--text-dim)'; }}
              >Decline</button>
              <button onClick={onAccept} style={{
                fontFamily:"'Outfit', sans-serif", fontSize:14, fontWeight:500,
                padding:'10px 28px', borderRadius:10, border:'1px solid var(--accent)',
                background:'var(--accent)', color:'#0a0a0c', cursor:'pointer',
                transition:'all 0.2s'
              }}
                onMouseEnter={e => e.target.style.background='#5dd4a6'}
                onMouseLeave={e => e.target.style.background='var(--accent)'}
              >Accept</button>
            </div>
          </div>
        </div>
      );
    }

    /* ─── File Transfer Item ─── */
    function TransferItem({ file, direction }) {
      const isReceived = direction === 'received';
      const download = () => {
        const a = document.createElement('a');
        a.href = file.url;
        a.download = file.name;
        a.click();
      };
      return (
        <div style={{
          display:'flex', alignItems:'center', gap:14,
          padding:'14px 18px', background:'var(--surface-2)',
          border:'1px solid var(--border)', borderRadius:14,
          animation:'fadeUp 0.3s ease', marginBottom:10
        }}>
          <div style={{
            width:42, height:42, borderRadius:10,
            background: isReceived ? 'var(--accent-glow)' : 'rgba(99,102,241,0.1)',
            border: `1px solid ${isReceived ? 'var(--accent-dim)' : 'rgba(99,102,241,0.3)'}`,
            display:'flex', alignItems:'center', justifyContent:'center',
            color: isReceived ? 'var(--accent)' : '#818cf8', flexShrink:0
          }}>
            <FileIcon />
          </div>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{
              fontWeight:500, fontSize:14,
              overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'
            }}>{file.name}</div>
            <div style={{ color:'var(--text-dim)', fontSize:12, fontFamily:"'DM Mono', monospace", marginTop:2 }}>
              {formatBytes(file.size)} · {isReceived ? 'received' : 'sent'}
            </div>
          </div>
          {isReceived && file.url && (
            <button onClick={download} style={{
              width:36, height:36, borderRadius:8,
              background:'var(--accent-glow)', border:'1px solid var(--accent-dim)',
              color:'var(--accent)', cursor:'pointer',
              display:'flex', alignItems:'center', justifyContent:'center',
              transition:'all 0.2s', flexShrink:0
            }}
              onMouseEnter={e => e.currentTarget.style.background='var(--accent-dim)'}
              onMouseLeave={e => e.currentTarget.style.background='var(--accent-glow)'}
            >
              <DownloadIcon />
            </button>
          )}
        </div>
      );
    }

    /* ─── ShareLink Icon ─── */
    const ShareIcon = () => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
      </svg>
    );

    /* ─── Main App ─── */
    function App() {
      const [myId, setMyId] = useState('');
      const [peerId, setPeerId] = useState('');
      const [status, setStatus] = useState('idle'); // idle | connecting | awaiting | connected
      const [toast, setToast] = useState(null);
      const [pendingRequest, setPendingRequest] = useState(null);
      const [transfers, setTransfers] = useState([]);
      const [dragging, setDragging] = useState(false);
      const [copied, setCopied] = useState(false);
      const [sendProgress, setSendProgress] = useState(null); // { name, percent }
      const [receiveProgress, setReceiveProgress] = useState(null); // { name, percent }

      // Download link feature state
      const [hostedFiles, setHostedFiles] = useState([]); // files being shared via link
      const [linkDragging, setLinkDragging] = useState(false);
      const [linkCopied, setLinkCopied] = useState(null); // id of file whose link was copied
      const [isDownloading, setIsDownloading] = useState(false); // true when auto-downloading via link
      const [downloadProgress, setDownloadProgress] = useState(null);

      const peerRef = useRef(null);
      const connRef = useRef(null);
      const fileChunksRef = useRef({});
      const hostedFilesRef = useRef([]); // ref to access hosted files in callbacks

      const CHUNK_SIZE = 64 * 1024; // 64KB chunks

      const showToast = (message, type = 'info') => setToast({ message, type, key: Date.now() });

      // Keep ref in sync with state
      useEffect(() => { hostedFilesRef.current = hostedFiles; }, [hostedFiles]);

      /* ─── Send hosted file to a connection ─── */
      const sendHostedFile = useCallback((conn, file, fileData) => {
        const fileId = Date.now().toString(36) + Math.random().toString(36).slice(2);
        const totalChunks = Math.ceil(fileData.byteLength / CHUNK_SIZE);

        conn.send({
          type: 'file-meta',
          id: fileId,
          name: file.name,
          size: file.size,
          totalChunks,
          mimeType: file.type || 'application/octet-stream'
        });

        for (let i = 0; i < totalChunks; i++) {
          const start = i * CHUNK_SIZE;
          const end = Math.min(start + CHUNK_SIZE, fileData.byteLength);
          const chunk = fileData.slice(start, end);
          conn.send({ type: 'file-chunk', id: fileId, index: i, chunk });
        }

        conn.send({ type: 'download-complete' });
      }, []);

      /* ─── Initialize PeerJS ─── */
      useEffect(() => {
        // Check if URL has a hash action
        const hash = window.location.hash;
        const dlMatch = hash.match(/^#dl=(.+)$/);
        const connectMatch = hash.match(/^#connect=(.+)$/);

        const id = generateId();
        const peer = new Peer(id);

        peer.on('open', (assignedId) => {
          setMyId(assignedId);

          // If we have a connect link, auto-request connection
          if (connectMatch) {
            const targetId = connectMatch[1];
            setPeerId(targetId);
            setStatus('connecting');
            const conn = peer.connect(targetId, {
              metadata: { type: 'request', fromId: assignedId },
              reliable: true
            });
            connRef.current = conn;
            conn.on('open', () => {
              setStatus('connected');
              showToast('Connected! You can now send files.', 'success');
            });
            conn.on('data', (data) => {
              if (data.type === 'file-meta') {
                fileChunksRef.current[data.id] = {
                  name: data.name, size: data.size,
                  totalChunks: data.totalChunks, chunks: [], mimeType: data.mimeType
                };
                setReceiveProgress({ name: data.name, percent: 0 });
              } else if (data.type === 'file-chunk') {
                const fileBuild = fileChunksRef.current[data.id];
                if (fileBuild) {
                  fileBuild.chunks[data.index] = data.chunk;
                  const received = fileBuild.chunks.filter(Boolean).length;
                  setReceiveProgress({ name: fileBuild.name, percent: Math.round((received / fileBuild.totalChunks) * 100) });
                  if (received === fileBuild.totalChunks) {
                    const blob = new Blob(fileBuild.chunks, { type: fileBuild.mimeType });
                    const url = URL.createObjectURL(blob);
                    setTransfers(prev => [...prev, { name: fileBuild.name, size: fileBuild.size, url, direction: 'received' }]);
                    setReceiveProgress(null);
                    showToast(`Received: ${fileBuild.name}`, 'success');
                    delete fileChunksRef.current[data.id];
                  }
                }
              } else if (data.type === 'accept') {
                setStatus('connected');
                showToast('Connection accepted!', 'success');
              } else if (data.type === 'reject') {
                setStatus('idle');
                showToast('Connection declined.', 'error');
                connRef.current = null;
              }
            });
            conn.on('close', () => { setStatus('idle'); connRef.current = null; showToast('Peer disconnected.', 'error'); });
            conn.on('error', (err) => { console.error('Connection error:', err); showToast('Connection error.', 'error'); });
            // Clean hash from URL
            history.replaceState(null, '', window.location.pathname + window.location.search);
          }

          // If we have a download link, auto-connect to the host
          if (dlMatch) {
            const hostId = dlMatch[1];
            setIsDownloading(true);
            setDownloadProgress('Connecting to host...');
            const conn = peer.connect(hostId, {
              metadata: { type: 'download-request' },
              reliable: true
            });

            conn.on('open', () => {
              setDownloadProgress('Connected. Waiting for file...');
            });

            conn.on('data', (data) => {
              if (data.type === 'file-meta') {
                setDownloadProgress(`Receiving: ${data.name} (${formatBytes(data.size)})`);
                fileChunksRef.current[data.id] = {
                  name: data.name,
                  size: data.size,
                  totalChunks: data.totalChunks,
                  chunks: [],
                  mimeType: data.mimeType
                };
              } else if (data.type === 'file-chunk') {
                const fileBuild = fileChunksRef.current[data.id];
                if (fileBuild) {
                  fileBuild.chunks[data.index] = data.chunk;
                  const received = fileBuild.chunks.filter(Boolean).length;
                  setDownloadProgress(`Receiving: ${fileBuild.name} — ${Math.round(received / fileBuild.totalChunks * 100)}%`);
                  if (received === fileBuild.totalChunks) {
                    const blob = new Blob(fileBuild.chunks, { type: fileBuild.mimeType });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = fileBuild.name;
                    a.click();
                    setTransfers(prev => [...prev, {
                      name: fileBuild.name,
                      size: fileBuild.size,
                      url,
                      direction: 'received'
                    }]);
                    setDownloadProgress(null);
                    setIsDownloading(false);
                    showToast(`Downloaded: ${fileBuild.name}`, 'success');
                    delete fileChunksRef.current[data.id];
                    // Clean hash from URL
                    history.replaceState(null, '', window.location.pathname + window.location.search);
                  }
                }
              }
            });

            conn.on('error', () => {
              setDownloadProgress(null);
              setIsDownloading(false);
              showToast('Failed to connect to host. The link may have expired.', 'error');
            });

            conn.on('close', () => {
              setDownloadProgress(null);
              setIsDownloading(false);
            });
          }
        });

        peer.on('connection', (conn) => {
          if (conn.metadata?.type === 'download-request') {
            // Someone is downloading via link — auto-send the file
            conn.on('open', () => {
              const files = hostedFilesRef.current;
              if (files.length > 0) {
                // Send the first hosted file (or find by ID if we add more later)
                const hosted = files[0];
                sendHostedFile(conn, hosted.file, hosted.data);
              }
            });
          } else if (conn.metadata?.type === 'request') {
            setPendingRequest({ fromId: conn.metadata.fromId, conn });
          }
        });

        peer.on('error', (err) => {
          console.error('Peer error:', err);
          if (err.type === 'peer-unavailable') {
            showToast('Peer not found. Check the ID and try again.', 'error');
            setStatus('idle');
            setIsDownloading(false);
            setDownloadProgress(null);
          }
        });

        peerRef.current = peer;
        return () => peer.destroy();
      }, []);

      /* ─── Setup data connection handlers ─── */
      const setupConn = useCallback((conn) => {
        connRef.current = conn;

        conn.on('open', () => {
          setStatus('connected');
          showToast('Connected! You can now send files.', 'success');
        });

        conn.on('data', (data) => {
          if (data.type === 'file-meta') {
            fileChunksRef.current[data.id] = {
              name: data.name,
              size: data.size,
              totalChunks: data.totalChunks,
              chunks: [],
              mimeType: data.mimeType
            };
            setReceiveProgress({ name: data.name, percent: 0 });
          } else if (data.type === 'file-chunk') {
            const fileBuild = fileChunksRef.current[data.id];
            if (fileBuild) {
              fileBuild.chunks[data.index] = data.chunk;
              const received = fileBuild.chunks.filter(Boolean).length;
              setReceiveProgress({ name: fileBuild.name, percent: Math.round((received / fileBuild.totalChunks) * 100) });
              if (received === fileBuild.totalChunks) {
                const blob = new Blob(fileBuild.chunks, { type: fileBuild.mimeType });
                const url = URL.createObjectURL(blob);
                setTransfers(prev => [...prev, {
                  name: fileBuild.name,
                  size: fileBuild.size,
                  url,
                  direction: 'received'
                }]);
                setReceiveProgress(null);
                showToast(`Received: ${fileBuild.name}`, 'success');
                delete fileChunksRef.current[data.id];
              }
            }
          } else if (data.type === 'accept') {
            setStatus('connected');
            showToast('Connection accepted!', 'success');
          } else if (data.type === 'reject') {
            setStatus('idle');
            showToast('Connection declined.', 'error');
            connRef.current = null;
          }
        });

        conn.on('close', () => {
          setStatus('idle');
          connRef.current = null;
          showToast('Peer disconnected.', 'error');
        });

        conn.on('error', (err) => {
          console.error('Connection error:', err);
          showToast('Connection error.', 'error');
        });
      }, []);

      /* ─── Send connection request ─── */
      const requestConnection = () => {
        if (!peerId.trim() || !peerRef.current) return;
        setStatus('connecting');
        const conn = peerRef.current.connect(peerId.trim(), {
          metadata: { type: 'request', fromId: myId },
          reliable: true
        });
        setupConn(conn);
      };

      /* ─── Accept / Reject ─── */
      const acceptRequest = () => {
        if (!pendingRequest) return;
        const { conn } = pendingRequest;
        setupConn(conn);
        // Also open a reverse connection for bidirectional
        conn.on('open', () => {
          conn.send({ type: 'accept' });
          setStatus('connected');
        });
        // If already open
        if (conn.open) {
          conn.send({ type: 'accept' });
          setStatus('connected');
        }
        setPendingRequest(null);
      };

      const rejectRequest = () => {
        if (!pendingRequest) return;
        const { conn } = pendingRequest;
        conn.on('open', () => conn.send({ type: 'reject' }));
        if (conn.open) conn.send({ type: 'reject' });
        setPendingRequest(null);
      };

      /* ─── Send file in chunks ─── */
      const sendFile = (file) => {
        const conn = connRef.current;
        if (!conn || !conn.open) {
          showToast('Not connected to a peer.', 'error');
          return;
        }
        const fileId = Date.now().toString(36) + Math.random().toString(36).slice(2);
        const totalChunks = Math.ceil(file.size / CHUNK_SIZE);

        conn.send({
          type: 'file-meta',
          id: fileId,
          name: file.name,
          size: file.size,
          totalChunks,
          mimeType: file.type || 'application/octet-stream'
        });

        setSendProgress({ name: file.name, percent: 0 });

        const reader = new FileReader();
        reader.onload = () => {
          const buffer = reader.result;
          let i = 0;
          const sendNext = () => {
            if (i < totalChunks) {
              const start = i * CHUNK_SIZE;
              const end = Math.min(start + CHUNK_SIZE, file.size);
              const chunk = buffer.slice(start, end);
              conn.send({ type: 'file-chunk', id: fileId, index: i, chunk });
              i++;
              setSendProgress({ name: file.name, percent: Math.round((i / totalChunks) * 100) });
              setTimeout(sendNext, 0);
            } else {
              setSendProgress(null);
              setTransfers(prev => [...prev, {
                name: file.name,
                size: file.size,
                direction: 'sent'
              }]);
              showToast(`Sent: ${file.name}`, 'success');
            }
          };
          sendNext();
        };
        reader.readAsArrayBuffer(file);
      };

      /* ─── Drag & Drop handlers ─── */
      const onDragOver = (e) => { e.preventDefault(); e.stopPropagation(); setDragging(true); };
      const onDragLeave = (e) => { e.preventDefault(); e.stopPropagation(); setDragging(false); };
      const onDrop = (e) => {
        e.preventDefault();
        e.stopPropagation();
        setDragging(false);
        const files = e.dataTransfer.files;
        for (let i = 0; i < files.length; i++) sendFile(files[i]);
      };

      const onFileSelect = (e) => {
        const files = e.target.files;
        for (let i = 0; i < files.length; i++) sendFile(files[i]);
        e.target.value = '';
      };

      const copyId = () => {
        const link = `${window.location.origin}${window.location.pathname}#connect=${myId}`;
        navigator.clipboard.writeText(link);
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      };

      const disconnect = () => {
        if (connRef.current) connRef.current.close();
        connRef.current = null;
        setStatus('idle');
        setPeerId('');
      };

      /* ─── Host file for download link ─── */
      const hostFile = (file) => {
        const reader = new FileReader();
        reader.onload = () => {
          const id = Date.now().toString(36) + Math.random().toString(36).slice(2);
          const link = `${window.location.origin}${window.location.pathname}#dl=${myId}`;
          const entry = { id, file, data: reader.result, link };
          setHostedFiles(prev => [entry, ...prev]);
          showToast(`Link created for: ${file.name}`, 'success');
        };
        reader.readAsArrayBuffer(file);
      };

      const removeHostedFile = (id) => {
        setHostedFiles(prev => prev.filter(f => f.id !== id));
      };

      const copyLink = (link, id) => {
        navigator.clipboard.writeText(link);
        setLinkCopied(id);
        setTimeout(() => setLinkCopied(null), 2000);
      };

      /* ─── Link drop zone handlers ─── */
      const onLinkDragOver = (e) => { e.preventDefault(); e.stopPropagation(); setLinkDragging(true); };
      const onLinkDragLeave = (e) => { e.preventDefault(); e.stopPropagation(); setLinkDragging(false); };
      const onLinkDrop = (e) => {
        e.preventDefault();
        e.stopPropagation();
        setLinkDragging(false);
        const files = e.dataTransfer.files;
        for (let i = 0; i < files.length; i++) hostFile(files[i]);
      };
      const onLinkFileSelect = (e) => {
        const files = e.target.files;
        for (let i = 0; i < files.length; i++) hostFile(files[i]);
        e.target.value = '';
      };

      /* ─── Render ─── */
      return (
        <div style={{
          maxWidth: 520, margin: '0 auto',
          padding: '60px 20px 80px', minHeight: '100vh'
        }}>

          {/* Header */}
          <div style={{ textAlign:'center', marginBottom:48, animation:'fadeUp 0.5s ease' }}>
            <div style={{
              fontFamily:"'DM Mono', monospace", fontSize:11, fontWeight:400,
              letterSpacing:3, textTransform:'uppercase', color:'var(--accent)',
              marginBottom:12
            }}>
              peer-to-peer
            </div>
            <h1 style={{
              fontSize:48, fontWeight:700, letterSpacing:'-0.03em',
              lineHeight:1, marginBottom:10
            }}>
              drop<span style={{ color:'var(--accent)' }}>.</span>
            </h1>
            <p style={{ color:'var(--text-dim)', fontSize:15, fontWeight:300 }}>
              Send files directly between browsers. No server, no upload.
            </p>
          </div>

          {/* Your ID card */}
          <div style={{
            background:'var(--surface)', border:'1px solid var(--border)',
            borderRadius:16, padding:'22px 26px', marginBottom:20,
            animation:'fadeUp 0.5s ease 0.1s both'
          }}>
            <div style={{
              fontFamily:"'DM Mono', monospace", fontSize:11,
              color:'var(--text-dim)', letterSpacing:1, textTransform:'uppercase',
              marginBottom:10
            }}>
              Your ID
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:12 }}>
              <div style={{
                flex:1, fontFamily:"'DM Mono', monospace", fontSize:20, fontWeight:500,
                color: myId ? 'var(--text)' : 'var(--text-dim)',
                animation: myId ? 'none' : 'pulse 1.5s infinite'
              }}>
                {myId || 'connecting...'}
              </div>
              {myId && (
                <button onClick={copyId} style={{
                  display:'flex', alignItems:'center', gap:6,
                  padding:'7px 14px', borderRadius:8,
                  border:'1px solid var(--border)', background:'var(--surface-2)',
                  color: copied ? 'var(--accent)' : 'var(--text-dim)',
                  cursor:'pointer', fontFamily:"'DM Mono', monospace", fontSize:12,
                  transition:'all 0.2s'
                }}
                  onMouseEnter={e => e.currentTarget.style.borderColor='var(--border-active)'}
                  onMouseLeave={e => e.currentTarget.style.borderColor='var(--border)'}
                >
                  {copied ? <><CheckIcon /> copied</> : <><LinkIcon /> copy direct connect link</>}
                </button>
              )}
            </div>
          </div>

          {/* Connect section */}
          {status !== 'connected' && (
            <div style={{
              background:'var(--surface)', border:'1px solid var(--border)',
              borderRadius:16, padding:'22px 26px', marginBottom:20,
              animation:'fadeUp 0.5s ease 0.2s both'
            }}>
              <div style={{
                fontFamily:"'DM Mono', monospace", fontSize:11,
                color:'var(--text-dim)', letterSpacing:1, textTransform:'uppercase',
                marginBottom:14
              }}>
                Connect to Peer
              </div>
              <div style={{ display:'flex', gap:10, flexWrap:'wrap' }}>
                <input
                  type="text"
                  value={peerId}
                  onChange={e => setPeerId(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && requestConnection()}
                  placeholder="enter peer id..."
                  disabled={status === 'connecting'}
                  style={{
                    flex:'1 1 180px', minWidth:0, padding:'11px 16px', borderRadius:10,
                    border:'1px solid var(--border)', background:'var(--bg)',
                    color:'var(--text)', fontFamily:"'DM Mono', monospace", fontSize:14,
                    outline:'none', transition:'border-color 0.2s', boxSizing:'border-box'
                  }}
                  onFocus={e => e.target.style.borderColor='var(--accent-dim)'}
                  onBlur={e => e.target.style.borderColor='var(--border)'}
                />
                <button
                  onClick={requestConnection}
                  disabled={!peerId.trim() || status === 'connecting'}
                  style={{
                    flex:'1 1 auto', padding:'11px 24px', borderRadius:10,
                    border:'1px solid var(--accent)',
                    background: status === 'connecting' ? 'var(--accent-dim)' : 'var(--accent)',
                    color:'#0a0a0c', fontFamily:"'Outfit', sans-serif",
                    fontSize:14, fontWeight:600, cursor: status === 'connecting' ? 'wait' : 'pointer',
                    transition:'all 0.2s', whiteSpace:'nowrap', boxSizing:'border-box'
                  }}
                  onMouseEnter={e => { if(status !== 'connecting') e.target.style.background='#5dd4a6'; }}
                  onMouseLeave={e => { if(status !== 'connecting') e.target.style.background='var(--accent)'; }}
                >
                  {status === 'connecting' ? 'connecting...' : 'connect'}
                </button>
              </div>
            </div>
          )}

          {/* Connected state */}
          {status === 'connected' && (
            <>
              <div style={{
                background:'var(--surface)', border:'1px solid var(--accent-dim)',
                borderRadius:16, padding:'18px 26px', marginBottom:20,
                animation:'fadeUp 0.3s ease',
                display:'flex', alignItems:'center', justifyContent:'space-between'
              }}>
                <div style={{ display:'flex', alignItems:'center', gap:12 }}>
                  <div style={{
                    width:10, height:10, borderRadius:'50%', background:'var(--accent)',
                    animation:'ripple 2s infinite'
                  }} />
                  <div>
                    <div style={{ fontFamily:"'DM Mono', monospace", fontSize:13, color:'var(--text-dim)' }}>
                      connected to
                    </div>
                    <div style={{ fontFamily:"'DM Mono', monospace", fontSize:15, fontWeight:500, color:'var(--accent)' }}>
                      {peerId || connRef.current?.peer || '—'}
                    </div>
                  </div>
                </div>
                <button onClick={disconnect} style={{
                  padding:'7px 14px', borderRadius:8,
                  border:'1px solid var(--border)', background:'var(--surface-2)',
                  color:'var(--text-dim)', cursor:'pointer', fontFamily:"'DM Mono', monospace",
                  fontSize:12, display:'flex', alignItems:'center', gap:6, transition:'all 0.2s'
                }}
                  onMouseEnter={e => { e.currentTarget.style.borderColor='var(--danger)'; e.currentTarget.style.color='var(--danger)'; }}
                  onMouseLeave={e => { e.currentTarget.style.borderColor='var(--border)'; e.currentTarget.style.color='var(--text-dim)'; }}
                >
                  <XIcon /> disconnect
                </button>
              </div>

              {/* Drop zone */}
              <div
                onDragOver={onDragOver}
                onDragLeave={onDragLeave}
                onDrop={onDrop}
                onClick={() => document.getElementById('file-input').click()}
                style={{
                  border: `2px dashed ${dragging ? 'var(--accent)' : 'var(--border)'}`,
                  borderRadius:20, padding:'50px 30px', textAlign:'center',
                  cursor:'pointer', transition:'all 0.3s',
                  background: dragging ? 'var(--accent-glow)' : 'var(--surface)',
                  marginBottom:24, animation:'fadeUp 0.4s ease'
                }}
                onMouseEnter={e => { if(!dragging) { e.currentTarget.style.borderColor='var(--border-active)'; e.currentTarget.style.background='var(--surface-2)'; }}}
                onMouseLeave={e => { if(!dragging) { e.currentTarget.style.borderColor='var(--border)'; e.currentTarget.style.background='var(--surface)'; }}}
              >
                <div style={{ marginBottom:14 }}>
                  <svg width="40" height="40" viewBox="0 0 24 24" fill="none"
                    stroke={dragging ? 'var(--accent)' : 'var(--text-dim)'}
                    strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"
                    style={{ transition:'all 0.3s' }}
                  >
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                  </svg>
                </div>
                <div style={{
                  fontSize:16, fontWeight:500, marginBottom:6,
                  color: dragging ? 'var(--accent)' : 'var(--text)'
                }}>
                  {dragging ? 'Drop to send' : 'Drag & drop files here'}
                </div>
                <div style={{ color:'var(--text-dim)', fontSize:13, fontWeight:300 }}>
                  or click to browse
                </div>
                <input id="file-input" type="file" multiple style={{ display:'none' }} onChange={onFileSelect} />
              </div>
            </>
          )}

          {/* ─── Progress Bars ─── */}
          {sendProgress && (
            <div style={{
              background:'var(--surface)', border:'1px solid rgba(99,102,241,0.4)',
              borderRadius:14, padding:'16px 22px', marginBottom:20,
              animation:'fadeUp 0.3s ease'
            }}>
              <div style={{ display:'flex', justifyContent:'space-between', marginBottom:10 }}>
                <div style={{
                  fontFamily:"'DM Mono', monospace", fontSize:12, color:'var(--text-dim)',
                  overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', maxWidth:'70%'
                }}>
                  ↑ Sending: {sendProgress.name}
                </div>
                <div style={{ fontFamily:"'DM Mono', monospace", fontSize:12, color:'#818cf8' }}>
                  {sendProgress.percent}%
                </div>
              </div>
              <div style={{
                height:6, borderRadius:3, background:'var(--surface-2)',
                overflow:'hidden'
              }}>
                <div style={{
                  height:'100%', borderRadius:3,
                  background:'linear-gradient(90deg, #818cf8, #a78bfa)',
                  width: `${sendProgress.percent}%`,
                  transition:'width 0.15s ease'
                }} />
              </div>
            </div>
          )}

          {receiveProgress && (
            <div style={{
              background:'var(--surface)', border:'1px solid var(--accent-dim)',
              borderRadius:14, padding:'16px 22px', marginBottom:20,
              animation:'fadeUp 0.3s ease'
            }}>
              <div style={{ display:'flex', justifyContent:'space-between', marginBottom:10 }}>
                <div style={{
                  fontFamily:"'DM Mono', monospace", fontSize:12, color:'var(--text-dim)',
                  overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', maxWidth:'70%'
                }}>
                  ↓ Receiving: {receiveProgress.name}
                </div>
                <div style={{ fontFamily:"'DM Mono', monospace", fontSize:12, color:'var(--accent)' }}>
                  {receiveProgress.percent}%
                </div>
              </div>
              <div style={{
                height:6, borderRadius:3, background:'var(--surface-2)',
                overflow:'hidden'
              }}>
                <div style={{
                  height:'100%', borderRadius:3,
                  background:'linear-gradient(90deg, var(--accent), #5dd4a6)',
                  width: `${receiveProgress.percent}%`,
                  transition:'width 0.15s ease'
                }} />
              </div>
            </div>
          )}

          {/* ─── Download Link Section ─── */}
          {!isDownloading && status !== 'connected' && (
            <div style={{
              background:'var(--surface)', border:'1px solid var(--border)',
              borderRadius:16, padding:'22px 26px', marginBottom:20,
              animation:'fadeUp 0.5s ease 0.3s both'
            }}>
              <div style={{
                fontFamily:"'DM Mono', monospace", fontSize:11,
                color:'var(--text-dim)', letterSpacing:1, textTransform:'uppercase',
                marginBottom:14, display:'flex', alignItems:'center', gap:8
              }}>
                <ShareIcon /> Create Download Link
              </div>
              <div
                onDragOver={onLinkDragOver}
                onDragLeave={onLinkDragLeave}
                onDrop={onLinkDrop}
                onClick={() => document.getElementById('link-file-input').click()}
                style={{
                  border: `2px dashed ${linkDragging ? '#818cf8' : 'var(--border)'}`,
                  borderRadius:14, padding:'32px 20px', textAlign:'center',
                  cursor: myId ? 'pointer' : 'not-allowed', transition:'all 0.3s',
                  background: linkDragging ? 'rgba(99,102,241,0.08)' : 'transparent',
                  opacity: myId ? 1 : 0.5
                }}
                onMouseEnter={e => { if(!linkDragging && myId) { e.currentTarget.style.borderColor='var(--border-active)'; e.currentTarget.style.background='var(--surface-2)'; }}}
                onMouseLeave={e => { if(!linkDragging) { e.currentTarget.style.borderColor='var(--border)'; e.currentTarget.style.background='transparent'; }}}
              >
                <div style={{ marginBottom:10 }}>
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
                    stroke={linkDragging ? '#818cf8' : 'var(--text-dim)'}
                    strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"
                    style={{ transition:'all 0.3s' }}
                  >
                    <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
                    <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
                  </svg>
                </div>
                <div style={{
                  fontSize:14, fontWeight:500, marginBottom:4,
                  color: linkDragging ? '#818cf8' : 'var(--text)'
                }}>
                  {linkDragging ? 'Drop to create link' : 'Drop a file to create a shareable link'}
                </div>
                <div style={{ color:'var(--text-dim)', fontSize:12, fontWeight:300 }}>
                  Anyone with the link can download directly from your browser
                </div>
                <input id="link-file-input" type="file" style={{ display:'none' }} onChange={onLinkFileSelect} disabled={!myId} />
              </div>

              {/* Hosted files list */}
              {hostedFiles.length > 0 && (
                <div style={{ marginTop:16 }}>
                  {hostedFiles.map(hosted => (
                    <div key={hosted.id} style={{
                      display:'flex', alignItems:'center', gap:12,
                      padding:'12px 16px', background:'var(--surface-2)',
                      border:'1px solid var(--border)', borderRadius:12,
                      marginBottom:8, animation:'fadeUp 0.3s ease'
                    }}>
                      <div style={{
                        width:38, height:38, borderRadius:8,
                        background:'rgba(99,102,241,0.1)', border:'1px solid rgba(99,102,241,0.3)',
                        display:'flex', alignItems:'center', justifyContent:'center',
                        color:'#818cf8', flexShrink:0
                      }}>
                        <FileIcon />
                      </div>
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{
                          fontWeight:500, fontSize:13,
                          overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'
                        }}>{hosted.file.name}</div>
                        <div style={{ color:'var(--text-dim)', fontSize:11, fontFamily:"'DM Mono', monospace", marginTop:2 }}>
                          {formatBytes(hosted.file.size)} · sharing via link
                        </div>
                      </div>
                      <button onClick={() => copyLink(hosted.link, hosted.id)} style={{
                        display:'flex', alignItems:'center', gap:5,
                        padding:'6px 12px', borderRadius:7,
                        border: `1px solid ${linkCopied === hosted.id ? 'var(--accent-dim)' : 'var(--border)'}`,
                        background: linkCopied === hosted.id ? 'var(--accent-glow)' : 'var(--surface)',
                        color: linkCopied === hosted.id ? 'var(--accent)' : 'var(--text-dim)',
                        cursor:'pointer', fontFamily:"'DM Mono', monospace", fontSize:11,
                        transition:'all 0.2s', flexShrink:0
                      }}
                        onMouseEnter={e => e.currentTarget.style.borderColor='var(--border-active)'}
                        onMouseLeave={e => e.currentTarget.style.borderColor=linkCopied === hosted.id ? 'var(--accent-dim)' : 'var(--border)'}
                      >
                        {linkCopied === hosted.id ? <><CheckIcon /> copied</> : <><CopyIcon /> copy link</>}
                      </button>
                      <button onClick={() => removeHostedFile(hosted.id)} style={{
                        width:30, height:30, borderRadius:6,
                        border:'1px solid var(--border)', background:'var(--surface)',
                        color:'var(--text-dim)', cursor:'pointer',
                        display:'flex', alignItems:'center', justifyContent:'center',
                        transition:'all 0.2s', flexShrink:0
                      }}
                        onMouseEnter={e => { e.currentTarget.style.borderColor='var(--danger)'; e.currentTarget.style.color='var(--danger)'; }}
                        onMouseLeave={e => { e.currentTarget.style.borderColor='var(--border)'; e.currentTarget.style.color='var(--text-dim)'; }}
                      >
                        <XIcon />
                      </button>
                    </div>
                  ))}
                  <div style={{
                    fontFamily:"'DM Mono', monospace", fontSize:11,
                    color:'var(--warning)', marginTop:8, paddingLeft:4, opacity:0.8
                  }}>
                    keep this tab open — files are served from your browser
                  </div>
                </div>
              )}
            </div>
          )}

          {/* Download in progress overlay */}
          {isDownloading && (
            <div style={{
              background:'var(--surface)', border:'1px solid rgba(99,102,241,0.4)',
              borderRadius:16, padding:'40px 26px', marginBottom:20,
              animation:'fadeUp 0.3s ease', textAlign:'center'
            }}>
              <div style={{
                width:56, height:56, borderRadius:'50%',
                background:'rgba(99,102,241,0.1)', border:'1px solid rgba(99,102,241,0.3)',
                display:'flex', alignItems:'center', justifyContent:'center',
                margin:'0 auto 20px', animation:'ripple 2s infinite'
              }}>
                <DownloadIcon />
              </div>
              <h3 style={{ fontFamily:"'Outfit', sans-serif", fontWeight:600, fontSize:18, marginBottom:8 }}>
                Downloading File
              </h3>
              <p style={{
                color:'var(--text-dim)', fontSize:13,
                fontFamily:"'DM Mono', monospace"
              }}>
                {downloadProgress || 'Preparing...'}
              </p>
            </div>
          )}

          {/* Transfer history */}
          {transfers.length > 0 && (
            <div style={{ animation:'fadeUp 0.3s ease' }}>
              <div style={{
                fontFamily:"'DM Mono', monospace", fontSize:11,
                color:'var(--text-dim)', letterSpacing:1, textTransform:'uppercase',
                marginBottom:12, paddingLeft:4
              }}>
                Transfers
              </div>
              {[...transfers].reverse().map((t, i) => (
                <TransferItem key={i} file={t} direction={t.direction} />
              ))}
            </div>
          )}

          {/* Connection request modal */}
          {pendingRequest && (
            <ConnectionModal
              fromId={pendingRequest.fromId}
              onAccept={acceptRequest}
              onReject={rejectRequest}
            />
          )}

          {/* Toast */}
          {toast && (
            <Toast
              key={toast.key}
              message={toast.message}
              type={toast.type}
              onDone={() => setToast(null)}
            />
          )}

          {/* Footer */}
          <div style={{
            textAlign:'center', marginTop:48,
            fontFamily:"'DM Mono', monospace", fontSize:11,
            color:'var(--text-dim)', opacity:0.5
          }}>
            files never touch a server · share links or connect directly · powered by WebRTC
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
